<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Ahmed Ali Ghori  3D Frontend Developer</title>
  <desc id="desc">Animated developer profile banner with isometric 3D shapes</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10100f"/>
      <stop offset="45%" stop-color="#1a1916"/>
      <stop offset="100%" stop-color="#10100f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4d2f"/>
      <stop offset="50%" stop-color="#d7ff3f"/>
      <stop offset="100%" stop-color="#ef4d2f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#f6f6f0" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- floating particles -->
  <g fill="#d7ff3f" opacity="0.55">
    <circle cx="120" cy="80" r="2"><animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="120" r="2.5"><animate attributeName="cy" values="120;95;120" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="220" r="1.8"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="240" r="2"><animate attributeName="cx" values="180;200;180" dur="6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- isometric cube left -->
  <g transform="translate(90 150)" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="90 150; 90 142; 90 150" dur="5s" repeatCount="indefinite"/>
    <polygon points="0,30 40,10 80,30 40,50" fill="#ef4d2f" opacity="0.95"/>
    <polygon points="0,30 0,70 40,90 40,50" fill="#c73d24"/>
    <polygon points="40,50 40,90 80,70 80,30" fill="#ff6b4a"/>
  </g>

  <!-- isometric cube right -->
  <g transform="translate(980 130)">
    <animateTransform attributeName="transform" type="translate" values="980 130; 980 122; 980 130" dur="4.5s" repeatCount="indefinite"/>
    <polygon points="0,30 40,10 80,30 40,50" fill="#d7ff3f" opacity="0.9"/>
    <polygon points="0,30 0,70 40,90 40,50" fill="#a8cc2f"/>
    <polygon points="40,50 40,90 80,70 80,30" fill="#eaff70"/>
  </g>

  <!-- orbit ring -->
  <ellipse cx="600" cy="165" rx="220" ry="58" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.35">
    <animate attributeName="rx" values="220;235;220" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.45;0.2" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- center text block -->
  <text x="600" y="118" text-anchor="middle" fill="#f6f6f0" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">Ahmed Ali Ghori</text>
  <text x="600" y="158" text-anchor="middle" fill="#d7ff3f" font-family="Consolas, monospace" font-size="18" letter-spacing="2">3D WEB · FRONTEND · AI · DATA</text>
  <text x="600" y="192" text-anchor="middle" fill="#b8b8b0" font-family="Segoe UI, Arial, sans-serif" font-size="16">Building immersive WebGL experiences &amp; intelligent products</text>

  <!-- animated underline -->
  <rect x="420" y="210" width="360" height="3" rx="2" fill="url(#accent)">
    <animate attributeName="width" values="280;420;280" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="460;390;460" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- code pill -->
  <g transform="translate(430 232)">
    <rect width="340" height="34" rx="17" fill="#f6f6f0" fill-opacity="0.06" stroke="#ef4d2f" stroke-opacity="0.35"/>
    <text x="170" y="22" text-anchor="middle" fill="#f6f6f0" font-family="Consolas, monospace" font-size="13">Three.js · R3F · React · Next.js · Python</text>
  </g>
</svg>
