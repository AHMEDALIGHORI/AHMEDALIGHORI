<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Webgel Studio</title>
  <desc id="desc">Editorial project cover with layered cinematic frames and a perspective grid.</desc>
  <defs>
