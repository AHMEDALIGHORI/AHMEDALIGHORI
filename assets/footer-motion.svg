<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" role="img" aria-label="Animated footer divider">
  <defs>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10100f" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ef4d2f"/>
      <stop offset="50%" stop-color="#d7ff3f"/>
      <stop offset="80%" stop-color="#ef4d2f"/>
      <stop offset="100%" stop-color="#10100f" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="80" fill="none"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="url(#line)" stroke-width="2">
    <animate attributeName="stroke-width" values="2;3;2" dur="3s" repeatCount="indefinite"/>
  </line>
  <circle cx="600" cy="40" r="5" fill="#d7ff3f">
    <animate attributeName="r" values="4;7;4" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="40" r="2" fill="#ef4d2f" opacity="0.8">
    <animate attributeName="cx" values="480;560;480" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="40" r="2" fill="#ef4d2f" opacity="0.8">
    <animate attributeName="cx" values="720;640;720" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
