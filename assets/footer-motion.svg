<svg width="1280" height="150" viewBox="0 0 1280 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated footer divider</title>
  <desc id="desc">A clean animated footer divider for the profile README.</desc>
  <style>
    .bg { fill: #10100f; }
    .label {
      font-family: Inter, Arial, sans-serif;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1.6px;
      text-transform: uppercase;
    }
    #bar {
      transform-origin: 88px 102px;
      animation: load 3.2s cubic-bezier(.76,0,.24,1) infinite;
    }
    #ticker {
      animation: ticker 8s linear infinite;
    }
    @keyframes load {
      0% { transform: scaleX(0); }
      50%, 70% { transform: scaleX(1); }
      100% { transform: scaleX(0); transform-origin: 1192px 102px; }
    }
    @keyframes ticker {
      from { transform: translateX(0); }
      to { transform: translateX(-410px); }
    }
  </style>
  <rect width="1280" height="150" rx="20" class="bg"/>
  <text x="88" y="62" class="label" fill="#f6f6f0">Clean code. Smart data. AI-powered future.</text>
  <rect x="88" y="101" width="1104" height="3" fill="#363632"/>
  <rect id="bar" x="88" y="101" width="1104" height="3" fill="#d7ff3f"/>
  <g transform="translate(0 142)">
    <text id="ticker" x="0" y="0" class="label" fill="#f6f6f0" opacity=".16">FRONTEND DEVELOPMENT DATA ANALYSIS AI AUTOMATION PREMIUM WEB EXPERIENCES FRONTEND DEVELOPMENT DATA ANALYSIS AI AUTOMATION</text>
  </g>
</svg>
